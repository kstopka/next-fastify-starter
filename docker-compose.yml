# docker-compose.yml — DEVELOPMENT (hot reloading)
#
# Backend:  tsx watch  → restarts on every .ts file change
# Frontend: next dev   → HMR / Fast Refresh
# Source code mounted as volumes — no image rebuilds needed
#
# Usage:
#   docker compose --file=docker-compose.yml up -d

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production}
      NODE_ENV: ${NODE_ENV:-production}
    command: sh -c "npx prisma migrate deploy && node dist/server.js"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_nm:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:4000}
      NODE_ENV: ${NODE_ENV:-development}
      WATCHPACK_POLLING: "true"
      HOSTNAME: "0.0.0.0"
    env_file: .env
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  postgres_data:
    name: postgres_data
  backend_nm:
  frontend_nm:

networks:
  app-network:
    driver: bridge
