# docker-compose.yml — DEVELOPMENT (hot reloading)
#
# Backend:  tsx watch  → restarts on every .ts file change in ./backend
# Frontend: next dev   → HMR / Fast Refresh in ./frontend
# Source code mounted as volumes — no image rebuilds needed
#
# First-time setup:
#   ./bin/setup.sh          ← installs deps, runs migrations, then stops
#
# Start development:
#   docker compose --file=docker-compose.yml up -d

services:
  db:
    container_name: db
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
    ports:
      - "${PORT:-5432}:${PORT:-5432}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    container_name: backend
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
      - backend_nm:/app/node_modules
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production}
      NODE_ENV: ${NODE_ENV:-development}
      # Override PORT from .env (which holds the DB port 5432) so Fastify binds to 4000
      PORT: "4000"
    # npm install is a no-op after setup (node_modules volume already populated)
    command: sh -c "npm install && npx prisma generate --schema=./prisma/schema.prisma && npm run dev"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    container_name: frontend
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_nm:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:4000}
      NODE_ENV: ${NODE_ENV:-development}
      WATCHPACK_POLLING: "true"
      HOSTNAME: "0.0.0.0"
    env_file: .env
    # npm install is a no-op after setup (node_modules volume already populated)
    # --no-turbopack: Turbopack requires BMI2 CPU instructions not available on all hosts (e.g. WSL2)
    command: sh -c "npm install && npm run dev -- --no-turbopack"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  postgres_data:
  backend_nm:
  frontend_nm:

networks:
  app-network:
    driver: bridge
